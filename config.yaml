# Configuracion del procesador de deteccion de anomalias (Cap. III, RNF-04).
#
# Todos los parametros son sobreescribibles por variables de entorno con prefijo
# PROCESSOR_ y separador __ para anidados (via pydantic-settings).
#
#   PROCESSOR_LOKI__URL=http://loki:3100      sobreescribe loki.url
#   PROCESSOR_PROCESSOR__DEFAULTS__THRESHOLD_K=2.5
#
# En docker-compose este archivo se monta como ConfigMap.
# En local se carga desde la raiz del proyecto.
#
# === PERFIL DE TEST/DESARROLLO ACTIVO ===
# Los valores actuales (W=1, H=1, min_observations=3, k=2.0) estan ajustados
# para iteracion rapida: empieza a detectar anomalias en 3-5 min.
# Para produccion, restaurar los valores comentados al lado de cada parametro.

# ----------------------------------------------------------------------------
# Fuente de datos
# ----------------------------------------------------------------------------
loki:
  url: "http://localhost:13100"   # SSH tunnel hacia el sandbox Hetzner
  query_step: "60s"
  max_lines: 5000                 # limite de Loki sandbox: max_entries_limit_per_query=5000
  timeout_seconds: 30

# ----------------------------------------------------------------------------
# Destino de alertas
# ----------------------------------------------------------------------------
alertmanager:
  url: "http://alertmanager:9093"
  webhook_path: "/api/v2/alerts"
  timeout_seconds: 10

# ----------------------------------------------------------------------------
# Notificaciones via Telegram (canal opcional, paralelo a AlertManager)
# El token y chat_id se exportan como env vars (NO commitear en este archivo):
#   PROCESSOR_TELEGRAM__ENABLED=true
#   PROCESSOR_TELEGRAM__BOT_TOKEN=<token de BotFather>
#   PROCESSOR_TELEGRAM__CHAT_ID=<id del chat>
# ----------------------------------------------------------------------------
telegram:
  enabled: false                  # default off; activar via env
  bot_token: ""                   # exportar PROCESSOR_TELEGRAM__BOT_TOKEN
  chat_id: ""                     # exportar PROCESSOR_TELEGRAM__CHAT_ID
  timeout_seconds: 10
  min_severity: "warning"         # "warning" envia todas; "critical" solo |z|>=5

# ----------------------------------------------------------------------------
# Logica del procesador
# ----------------------------------------------------------------------------
processor:
  schedule_interval_minutes: 1    # W: TEST (prod = 5)
  history_days: 1                 # H: TEST (prod = 7)

  # Valores por defecto aplicados a todos los servicios.
  # Pueden sobreescribirse por servicio en `services[].overrides`.
  defaults:
    threshold_k: 2.0              # k: TEST sensible (prod = 3.0)
    min_observations: 3           # TEST (prod = 10) — empieza a detectar tras 3 ciclos

  # Servicios a monitorear. Cada uno apunta a un perfil de `profiles:`.
  services:
    - name: tecoposv1
      profile: winston_json
    - name: tecoposv2
      profile: nestjs
    - name: gateway
      profile: nestjs
      overrides:
        threshold_k: 1.8          # mas trafico, k mas estricto
    - name: midas-dev
      profile: nestjs
      overrides:
        threshold_k: 2.5          # mas ruidoso, k mas laxo
    - name: control
      profile: kafkajs_json
    - name: controlbeta
      profile: kafkajs_json

# ----------------------------------------------------------------------------
# Perfiles de parsing (Strategy pattern).
# ----------------------------------------------------------------------------
profiles:
  nestjs:
    type: regex
    pattern: '^\[Nest\]\s+\d+.*?\s+(?P<level>LOG|WARN|ERROR|DEBUG|VERBOSE)\s+\[(?P<context>[^\]]+)\]\s+(?P<message>.+)$'
    level_map:
      LOG: info
      WARN: warn
      ERROR: error
      DEBUG: debug
      VERBOSE: debug

  kafkajs_json:
    type: json
    level_field: level
    message_field: message
    extra_fields: [logger, groupId, broker]

  winston_json:
    type: json
    level_field: level
    message_field: message
    extra_fields: [label]

# ----------------------------------------------------------------------------
# Algoritmo Drain (Cap. II II.3.3, etapa 1)
# ----------------------------------------------------------------------------
drain:
  depth: 4
  similarity_threshold: 0.4
  max_children: 100
  extra_delimiters: []
  state_save_path: "./drain_state"
  state_save_interval: 5

# ----------------------------------------------------------------------------
# DBSCAN para clustering de anomalias (Cap. II II.3.3, etapa 3)
# ----------------------------------------------------------------------------
dbscan:
  eps: 0.5
  min_samples: 2
  metric: "euclidean"

# ----------------------------------------------------------------------------
# Persistencia del historico mu/sigma entre reinicios.
# ----------------------------------------------------------------------------
history:
  backend: sqlite                 # sqlite | memory
  path: "./drain_state/history.db"
  flush_every_cycles: 1           # 1 = cada ciclo (safest), >1 batchea
  schema_version: 1

# ----------------------------------------------------------------------------
# Endpoint Prometheus /metrics (Dashboard 3)
# ----------------------------------------------------------------------------
metrics:
  enabled: true
  port: 8000
  host: "0.0.0.0"

# ----------------------------------------------------------------------------
# Logging del propio procesador
# ----------------------------------------------------------------------------
logging:
  level: "INFO"                   # DEBUG en desarrollo, INFO en test/prod
  format: "console"               # json | console
