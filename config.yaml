# Configuracion del procesador de deteccion de anomalias (Cap. III, RNF-04).
#
# ============================================================================
# PERFILES DE ENTORNO (PROCESSOR_ENV)
# ============================================================================
# Los parametros del algoritmo (threshold_k, min_observations, etc.) los
# gestiona el perfil activo definido en settings.py. No los toques aqui
# salvo que quieras un override explicito para TODOS los entornos.
#
#   PROCESSOR_ENV=local         W=1min, H=1d, k=2.0, DEBUG, todos los niveles
#   PROCESSOR_ENV=development   W=2min, H=3d, k=2.5, INFO, warn+error
#   PROCESSOR_ENV=production    W=5min, H=7d, k=3.0, INFO/JSON, warn+error
#
# Cualquier variable de entorno PROCESSOR_* sobreescribe el perfil:
#   PROCESSOR_PROCESSOR__DEFAULTS__THRESHOLD_K=4.0
#   PROCESSOR_LOKI__URL=http://loki:3100
#
# En docker-compose este archivo se monta como ConfigMap.
# En local se carga desde la raiz del proyecto junto al .env.
# ============================================================================

# ----------------------------------------------------------------------------
# Fuente de datos
# ----------------------------------------------------------------------------
loki:
  url: "http://localhost:13100"   # SSH tunnel hacia el sandbox Hetzner
  query_step: "60s"
  max_lines: 5000                 # limite de Loki sandbox: max_entries_limit_per_query=5000
  timeout_seconds: 30

# ----------------------------------------------------------------------------
# Destino de alertas (AlertManager)
# ----------------------------------------------------------------------------
alertmanager:
  url: "http://alertmanager:9093"
  webhook_path: "/api/v2/alerts"
  timeout_seconds: 10

# ----------------------------------------------------------------------------
# Notificaciones via Telegram (canal opcional, paralelo a AlertManager)
# Configurar via .env o env vars — NO hardcodear tokens aqui:
#   PROCESSOR_TELEGRAM__ENABLED=true
#   PROCESSOR_TELEGRAM__BOT_TOKEN=<token de BotFather>
#   PROCESSOR_TELEGRAM__CHAT_ID=<id del chat>
# ----------------------------------------------------------------------------
telegram:
  enabled: false
  bot_token: ""
  chat_id: ""
  timeout_seconds: 10
  min_severity: "warning"         # "warning" = todas; "critical" = solo |z|>=5

# ----------------------------------------------------------------------------
# Logica del procesador
# NOTA: schedule_interval_minutes e history_days los gestiona PROCESSOR_ENV.
# Aqui solo van los overrides POR SERVICIO (caracteristicas del servicio,
# no del entorno).
# ----------------------------------------------------------------------------
processor:
  # Servicios a monitorear. Cada uno apunta a un perfil de `profiles:`.
  # `overrides` permite ajustar parametros para servicios con trafico
  # o nivel de ruido particular — se aplican sobre los defaults del perfil.
  services:
    - name: tecoposv1
      profile: winston_json
      overrides:
        # tecoposv1 (Express+Winston) emite errores de negocio como INFO:
        # "Payment processed", "Auth token validated", etc.
        monitor_levels: [info, warn, error]

    - name: tecoposv2
      profile: nestjs
      # defaults del perfil son suficientes para tecoposv2

    - name: gateway
      profile: nestjs
      overrides:
        # gateway tiene mas trafico que los demas (API edge):
        # threshold mas alto para no alertar por varianza normal de trafico
        threshold_k: 3.5
        # autenticacion y sesiones se loguean como INFO en NestJS:
        # "User authenticated", "JWT validated", "Unauthorized request"
        monitor_levels: [info, warn, error]

    - name: midas-dev
      profile: nestjs
      overrides:
        # midas-dev es el servicio mas ruidoso (webhooks de pago frecuentes):
        # k mas laxo para ignorar varianza normal de eventos de pago
        threshold_k: 4.0

    - name: control
      profile: kafkajs_json

    - name: controlbeta
      profile: kafkajs_json

# ----------------------------------------------------------------------------
# Perfiles de parsing (Strategy pattern, Cap. II II.3.2).
# Cada servicio apunta a uno de estos perfiles en processor.services.
# ----------------------------------------------------------------------------
profiles:
  nestjs:
    type: regex
    pattern: '^\[Nest\]\s+\d+.*?\s+(?P<level>LOG|WARN|ERROR|DEBUG|VERBOSE)\s+\[(?P<context>[^\]]+)\]\s+(?P<message>.+)$'
    level_map:
      LOG: info
      WARN: warn
      ERROR: error
      DEBUG: debug
      VERBOSE: debug

  kafkajs_json:
    type: json
    level_field: level
    message_field: message
    extra_fields: [logger, groupId, broker]

  winston_json:
    type: json
    level_field: level
    message_field: message
    extra_fields: [label]

# ----------------------------------------------------------------------------
# Algoritmo Drain (Cap. II II.3.3, etapa 1)
# ----------------------------------------------------------------------------
drain:
  depth: 4
  similarity_threshold: 0.4
  max_children: 100
  extra_delimiters: []
  state_save_path: "./drain_state"
  state_save_interval: 5

# ----------------------------------------------------------------------------
# DBSCAN para clustering de anomalias co-ocurrentes (Cap. II II.3.3, etapa 3)
# ----------------------------------------------------------------------------
dbscan:
  eps: 0.5
  min_samples: 2
  metric: "euclidean"

# ----------------------------------------------------------------------------
# Persistencia del historico mu/sigma entre reinicios.
# ----------------------------------------------------------------------------
history:
  backend: sqlite
  path: "./drain_state/history.db"
  flush_every_cycles: 1
  schema_version: 1

# ----------------------------------------------------------------------------
# Endpoint Prometheus /metrics
# ----------------------------------------------------------------------------
metrics:
  enabled: true
  port: 8000
  host: "0.0.0.0"
