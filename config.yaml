# Configuracion del procesador de deteccion de anomalias (Cap. III, RNF-04).
#
# ============================================================================
# PERFILES DE ENTORNO (PROCESSOR_ENV)
# ============================================================================
# Los parametros del algoritmo (threshold_k, min_observations, etc.) los
# gestiona el perfil activo definido en settings.py. No los toques aqui
# salvo que quieras un override explicito para TODOS los entornos.
#
#   PROCESSOR_ENV=local         W=1min, H=1d, k=2.0, DEBUG, todos los niveles
#   PROCESSOR_ENV=development   W=2min, H=3d, k=2.5, INFO, warn+error
#   PROCESSOR_ENV=production    W=5min, H=7d, k=3.0, INFO/JSON, warn+error
#
# Cualquier variable de entorno PROCESSOR_* sobreescribe el perfil:
#   PROCESSOR_PROCESSOR__DEFAULTS__THRESHOLD_K=4.0
#   PROCESSOR_LOKI__URL=http://loki:3100
#
# En docker-compose este archivo se monta como ConfigMap.
# En local se carga desde la raiz del proyecto junto al .env.
# ============================================================================

# ----------------------------------------------------------------------------
# Fuente de datos
# ----------------------------------------------------------------------------
loki:
  # url es OBLIGATORIO — definir en .env o como variable de entorno:
  #   Local:  PROCESSOR_LOKI__URL=http://172.16.0.3:30100  (NodePort expuesto en el cluster)
  #   k3s:    PROCESSOR_LOKI__URL=http://loki.tecopos-observability.svc.cluster.local:3100
  query_step: "60s"
  max_lines: 5000
  timeout_seconds: 30
  stream_label: "service_name"
# ----------------------------------------------------------------------------
# Destino de alertas (AlertManager)
# ----------------------------------------------------------------------------
alertmanager:
  url: "http://alertmanager:9093"
  webhook_path: "/api/v2/alerts"
  timeout_seconds: 10

# ----------------------------------------------------------------------------
# Notificaciones via Telegram — credenciales en .env, no aqui
# ----------------------------------------------------------------------------
telegram:
  enabled: false
  bot_token: ""
  chat_id: ""
  timeout_seconds: 10
  min_severity: "warning"         # "warning" = todas; "critical" = solo |z|>=5


processor:
  services:

    # --- Servicios activamente monitoreados ---

    - name: tecoposv1
      profile: winston_json
      overrides:
        # Express + Winston: errores de negocio (pagos, auth) vienen como INFO
        monitor_levels: [info, warn, error]

    - name: tecoposv2
      profile: nestjs

    - name: gateway
      profile: nestjs
      overrides:
        threshold_k: 3.5              # API edge: mas trafico, k mas alto
        monitor_levels: [info, warn, error]  # auth y sesiones son INFO aqui

    - name: gatewaybeta
      profile: nestjs
      overrides:
        threshold_k: 3.5              # mismas caracteristicas que gateway

    - name: midas-dev
      profile: nestjs
      overrides:
        threshold_k: 4.0              # webhooks de pago muy frecuentes → k laxo

    - name: control-server            # NOTA: en Loki es "control-server", no "control"
      profile: kafkajs_json

    - name: controlbeta
      profile: kafkajs_json

    - name: apollo
      profile: nestjs

    - name: hermes
      profile: nestjs

    # --- Entorno beta/staging (mismos perfiles que sus pares de desarrollo) ---

    - name: identitydev
      profile: nestjs

    - name: identitybeta
      profile: nestjs

    # --- Servicios disponibles pero deshabilitados (enabled: false) ---
    # Habilitarlos cuando se quiera monitorearlos. Sin impacto mientras esten off.

    - name: tecoposv1-sso
      profile: winston_json
      enabled: false

    - name: reservas-server
      profile: nestjs
      enabled: false

# ============================================================================
# PERFILES DE PARSING
# ============================================================================
# Cada perfil define como extraer {level, message} de una linea de log.
# Los servicios en processor.services referencian estos perfiles por nombre.
#
# Tipos disponibles:
#   regex       → texto plano con patron; requiere grupos nombrados `level` y `message`
#   json        → JSON estructurado; campos configurables
#   fallback    → cualquier texto; level=unknown (Drain lo procesa pero no genera alertas)
# ============================================================================
profiles:
  nestjs:
    type: regex
    # Formato: [Nest] PID  - DD/MM/YYYY HH:MM:SS AM  LEVEL [Context] message
    pattern: '^\[Nest\]\s+\d+.*?\s+(?P<level>LOG|WARN|ERROR|DEBUG|VERBOSE)\s+\[(?P<context>[^\]]+)\]\s+(?P<message>.+)$'
    level_map:
      LOG:     info
      WARN:    warn
      ERROR:   error
      DEBUG:   debug
      VERBOSE: debug

  kafkajs_json:
    type: json
    # Formato: {"level":"INFO","logger":"kafkajs","message":"...","groupId":"..."}
    level_field:   level
    message_field: message
    extra_fields:  [logger, groupId, broker]

  winston_json:
    type: json
    # Formato: {"level":"info","message":"...","timestamp":"...","label":"..."}
    level_field:   level
    message_field: message
    extra_fields:  [label]

# ----------------------------------------------------------------------------
# Algoritmo Drain
# ----------------------------------------------------------------------------
drain:
  depth: 4
  similarity_threshold: 0.4
  max_children: 100
  extra_delimiters: []
  state_save_path: "./drain_state"
  state_save_interval: 5

# ----------------------------------------------------------------------------
# DBSCAN para clustering de anomalias co-ocurrentes (Cap. II II.3.3, etapa 3)
# ----------------------------------------------------------------------------
dbscan:
  eps: 0.5
  min_samples: 2
  metric: "euclidean"

# ----------------------------------------------------------------------------
# Persistencia del historico mu/sigma entre reinicios
# ----------------------------------------------------------------------------
history:
  backend: sqlite
  path: "./drain_state/history.db"
  flush_every_cycles: 1
  schema_version: 1

# ----------------------------------------------------------------------------
# Endpoint Prometheus /metrics
# ----------------------------------------------------------------------------
metrics:
  enabled: true
  port: 8000
  host: "0.0.0.0"
