apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: tecopos-observability
data:
  loki-config.yaml: |
    # Configuracion Loki para TECOPOS k3s.
    # Identica a la local salvo limites de ingesta (mas altos) y stream limits.
    auth_enabled: false

    server:
      http_listen_port: 3100
      grpc_listen_port: 9095
      log_level: info

    common:
      instance_addr: 127.0.0.1
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory

    schema_config:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

    storage_config:
      tsdb_shipper:
        active_index_directory: /loki/tsdb-shipper-active
        cache_location: /loki/tsdb-shipper-cache
        cache_ttl: 24h
      filesystem:
        directory: /loki/chunks

    limits_config:
      retention_period: 720h           # 30 dias (RNF-05)
      reject_old_samples: true
      reject_old_samples_max_age: 168h
      max_query_series: 5000
      max_streams_per_user: 0
      max_global_streams_per_user: 50000
      ingestion_rate_mb: 30
      ingestion_burst_size_mb: 60
      allow_structured_metadata: true
      volume_enabled: true

    compactor:
      working_directory: /loki/compactor
      compaction_interval: 10m
      retention_enabled: true
      retention_delete_delay: 2h
      retention_delete_worker_count: 150
      delete_request_store: filesystem

    ruler:
      storage:
        type: local
        local:
          directory: /loki/rules
      rule_path: /loki/rules-tmp
      ring:
        kvstore:
          store: inmemory
      enable_api: true

    analytics:
      reporting_enabled: false
